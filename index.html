<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascensão Family</title>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 320px;
      padding: 20px;
      text-align: center;
    }

    /* ANIMAÇÃO CONTROLADA */
    .fade {
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.5s ease forwards;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }
    .delay-7 { animation-delay: 0.7s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 6px;
      margin: 0 auto 12px auto;
      display: block;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 20px;
      color: #D4AF37;
    }

    .headline {
      font-size: 16px;
      margin-bottom: 22px;
      font-weight: 500;
      opacity: 0.9;
    }

    /* BOTÕES PERFEITOS */
    .btn {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;

      width: 260px;
      margin: 10px auto;

      padding: 18px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-size: 17px;
      font-weight: 600;

      background: #111;
      border: 1px solid rgba(212,175,55,0.25);

      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .btn i {
      justify-self: center;
      font-size: 20px;
    }

    .btn span {
      text-align: center;
      width: 100%;
      display: block;
    }

    .btn .spacer {
      width: 48px;
    }

    /* TOQUE NATURAL */
    .btn:active {
      transform: scale(0.97);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .btn:hover {
      box-shadow: 0 0 10px rgba(212,175,55,0.15);
    }

    /* WHATSAPP DESTACADO */
    .whats {
      background: linear-gradient(135deg, #25D366, #1ebe5d);
      border: none;
      color: #000;
      font-weight: bold;
    }

    .whats i {
      color: #000;
    }

    /* CORES */
    .insta i { color: #E1306C; }
    .face i { color: #1877F2; }
    .tiktok i { color: #ffffff; }

  </style>
</head>

<body>

  <div class="container">

    <img class="logo fade delay-1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFqpyDDgjycJ_kV885FxdKx6Lbp1to0IaTHw&s">

    <h1 class="fade delay-2">Ascensão Family</h1>

    <div class="headline fade delay-3">
      Queres viver até aos 150 anos?
    </div>

    <a class="btn insta fade delay-4" href="https://instagram.com/ascensaoportugal" target="_blank">
      <i class="fab fa-instagram"></i>
      <span>Instagram</span>
      <div class="spacer"></div>
    </a>

    <a class="btn face fade delay-5" href="https://facebook.com/AscensaoFamily" target="_blank">
      <i class="fab fa-facebook-f"></i>
      <span>Facebook</span>
      <div class="spacer"></div>
    </a>

    <a class="btn tiktok fade delay-6" href="https://www.tiktok.com/@ascensaoportugal" target="_blank">
      <i class="fab fa-tiktok"></i>
      <span>TikTok</span>
      <div class="spacer"></div>
    </a>

    <a class="btn whats fade delay-7" href="https://wa.me/351965446229" target="_blank">
      <i class="fab fa-whatsapp"></i>
      <span>Falar no WhatsApp</span>
      <div class="spacer"></div>
    </a>

  </div>

</body>
</html>
