<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ascensão Family</title>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 320px;
      margin: auto;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 22px;
      letter-spacing: 1px;
      color: #D4AF37; /* dourado */
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      width: 100%;
      margin: 14px 0;
      padding: 15px;

      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-size: 16px;

      background: #111;
      border: 1px solid rgba(212,175,55,0.3);

      transition: 0.25s ease;
    }

    .btn i {
      font-size: 20px;
    }

    .btn:hover {
      transform: scale(1.05);
      border-color: #D4AF37;
      box-shadow: 0 0 15px rgba(212,175,55,0.3);
    }

    /* Ícones com cor original */
    .insta i { color: #E1306C; }
    .face i { color: #1877F2; }
    .whats i { color: #25D366; }

  </style>
</head>

<body>

  <div class="container">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFqpyDDgjycJ_kV885FxdKx6Lbp1to0IaTHw&s" class="logo">

    <h1>Ascensão Family</h1>

    <a class="btn insta" href="https://instagram.com/ascensaoportugal" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>

    <a class="btn face" href="https://facebook.com/AscensaoFamily" target="_blank">
      <i class="fab fa-facebook-f"></i> Facebook
    </a>

    <a class="btn whats" href="https://wa.me/351965446229" target="_blank">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

  </div>

</body>
</html>
