<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ascensão Family</title>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      padding: 6px;
      margin: 5px auto 10px auto;
      display: block;
    }

    h1 {
      margin: 5px 0 10px 0;
      font-size: 20px;
      color: #D4AF37;
    }

    .headline {
      font-size: 16px;
      margin-bottom: 20px;
      color: #fff;
      font-weight: bold;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      width: 100%;
      padding: 18px;
      margin: 10px 0;

      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-size: 17px;
      font-weight: bold;

      background: #111;
      border: 1px solid rgba(212,175,55,0.3);

      transition: 0.2s ease;
    }

    .btn i {
      font-size: 20px;
    }

    .btn:hover {
      transform: scale(1.03);
      border-color: #D4AF37;
      box-shadow: 0 0 10px rgba(212,175,55,0.3);
    }

    /* cores ícones */
    .insta i { color: #E1306C; }
    .face i { color: #1877F2; }
    .tiktok i { color: #ffffff; }
    .whats i { color: #25D366; }

  </style>
</head>

<body>

  <div class="container">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFqpyDDgjycJ_kV885FxdKx6Lbp1to0IaTHw&s" class="logo">

    <h1>Ascensão Family</h1>

    <div class="headline">
      Queres viver até aos 150 anos?
    </div>

    <a class="btn insta" href="https://instagram.com/ascensaoportugal" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>

    <a class="btn face" href="https://facebook.com/AscensaoFamily" target="_blank">
      <i class="fab fa-facebook-f"></i> Facebook
    </a>

    <a class="btn tiktok" href="https://www.tiktok.com/@ascensaoportugal" target="_blank">
      <i class="fab fa-tiktok"></i> TikTok
    </a>

    <a class="btn whats" href="https://wa.me/351965446229" target="_blank">
      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

  </div>

</body>
</html>
